<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Cars</title>

    <link rel="stylesheet" type="text/css" th:href="@{/css/styles.css}">

    <style>
        /* Локальные стили для страницы */
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background-color: #0f0f1a;
            color: #e0e0e0;
            margin: 20px;
            min-height: 100vh;
        }
        .container {
            max-width: 1000px;
            margin: 0 auto;
            padding: 20px;
        }
        h1 {
            color: #ffffff;
            text-align: center;
            font-size: 36px;
            margin-bottom: 10px;
        }
        .subtitle {
            text-align: center;
            color: #8888aa;
            margin-bottom: 30px;
        }

        /* === КНОПКИ ДЛЯ ВЫБОРА КОЛИЧЕСТВА === */
        .filter-buttons {
            display: flex;
            justify-content: center;
            gap: 12px;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }

        .btn-filter {
            display: inline-block;
            background-color: #1a1a2e;
            color: #e0e0e0;
            padding: 10px 24px;
            border: 2px solid #3a3a5a;
            border-radius: 25px;
            font-size: 16px;
            font-weight: 600;
            text-decoration: none;
            transition: all 0.3s ease;
            cursor: pointer;
            font-family: 'Segoe UI', Arial, sans-serif;
        }

        .btn-filter:hover {
            background-color: #6c63ff;
            border-color: #6c63ff;
            color: #ffffff;
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(108, 99, 255, 0.4);
        }

        .btn-filter:active {
            transform: translateY(0px);
        }

        /* Активная кнопка (для текущего выбора) */
        .btn-filter.active {
            background-color: #6c63ff;
            border-color: #6c63ff;
            color: #ffffff;
        }

        /* === ТАБЛИЦА === */
        table {
            border-collapse: collapse;
            width: 100%;
            margin-top: 20px;
            background-color: #1a1a2e;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.5);
        }
        th, td {
            padding: 14px 20px;
            text-align: left;
            border-bottom: 1px solid #2a2a4a;
        }
        th {
            background-color: #2a2a4a;
            color: #6c63ff;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-size: 14px;
        }
        tr:hover {
            background-color: #2a2a3e;
        }
        tr:last-child td {
            border-bottom: none;
        }

        .empty-message {
            text-align: center;
            color: #ff6b6b;
            padding: 20px;
            background-color: #1a1a2e;
            border-radius: 10px;
            margin-top: 20px;
        }
        .footer {
            text-align: center;
            margin-top: 40px;
        }

        /* === КНОПКА BACK TO HOME === */
        .btn-back {
            display: inline-block;
            background-color: #2d2d44;
            color: #ffffff;
            padding: 14px 40px;
            border: 2px solid #4a4a6a;
            border-radius: 30px;
            font-size: 18px;
            font-weight: 600;
            text-decoration: none;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            transition: all 0.3s ease;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
            font-family: 'Segoe UI', Arial, sans-serif;
        }

        .btn-back:hover {
            background-color: #6c63ff;
            border-color: #6c63ff;
            color: #ffffff;
            transform: translateY(-3px);
            box-shadow: 0 8px 30px rgba(108, 99, 255, 0.5);
        }

        .btn-back:active {
            transform: translateY(0px);
        }

        /* === СЧЁТЧИК МАШИН === */
        .counter {
            text-align: center;
            color: #8888aa;
            margin-bottom: 10px;
            font-size: 14px;
        }
        .counter span {
            color: #6c63ff;
            font-weight: bold;
        }
    </style>
</head>
<body>
<div class="container">
    <h1>Car List</h1>
    <p class="subtitle">Browse our collection of cars</p>

    <!-- === КНОПКИ ФИЛЬТРАЦИИ === -->
    <div class="filter-buttons">
        <a href="/cars" class="btn-filter" th:classappend="${param.count == null ? 'active' : ''}">All Cars</a>
        <a href="/cars?count=2" class="btn-filter" th:classappend="${param.count == '2' ? 'active' : ''}">Show 2 cars</a>
        <a href="/cars?count=3" class="btn-filter" th:classappend="${param.count == '3' ? 'active' : ''}">Show 3 cars</a>
        <a href="/cars?count=5" class="btn-filter" th:classappend="${param.count == '5' ? 'active' : ''}">Show 5 cars</a>
    </div>

    <!-- === СЧЁТЧИК === -->
    <div class="counter">
        Showing <span th:text="${#lists.size(cars)}">0</span> car(s)
    </div>

    <!-- === ТАБЛИЦА === -->
    <table>
        <thead>
        <tr>
            <th>#</th>
            <th>Brand</th>
            <th>Model</th>
            <th>Year</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="car, iterStat : ${cars}">
            <td th:text="${iterStat.index + 1}">1</td>
            <td th:text="${car.brand}"></td>
            <td th:text="${car.model}"></td>
            <td th:text="${car.year}"></td>
        </tr>
        </tbody>
    </table>

    <div th:if="${#lists.isEmpty(cars)}" class="empty-message">
        ⚠️ No cars found!
    </div>

    <!-- === КНОПКА BACK TO HOME === -->
    <div class="footer">
        <a href="/" class="btn-back">Back to Home</a>
    </div>
</div>
</body>
</html>
